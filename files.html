<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>الملفات — AQB EDU</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    /* ── File Card ───────────────────────────────────── */
    .file-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .25s;
    }
    .file-card.downloading { border-color: var(--blue); }
    .file-card.done        { border-color: var(--green); }
    .file-card.error       { border-color: var(--red); }

    .file-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
    }
    .file-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .file-meta { flex: 1; min-width: 0; }
    .file-name    { font-size: 14px; font-weight: 700; }
    .file-subject { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Download Button ─────────────────────────────── */
    .btn-dl {
      display: flex; align-items: center; gap: 6px;
      background: var(--blue2); color: #fff;
      border: none; border-radius: 10px;
      padding: 9px 14px; font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: opacity .15s, background .2s;
      font-family: inherit;
    }
    .btn-dl:active     { opacity: .75; }
    .btn-dl:disabled   { background: var(--surface); color: var(--muted); cursor: default; opacity: 1; }
    .btn-dl.done       { background: #14532d; color: var(--green); }
    .btn-dl.error-btn  { background: #450a0a; color: var(--red); }

    /* ── Progress ────────────────────────────────────── */
    .file-progress { padding: 0 16px 14px; display: none; }
    .file-card.downloading .file-progress,
    .file-card.done  .file-progress,
    .file-card.error .file-progress { display: block; }

    /* حاوية الصف الرئيسي */
    .progress-main {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }

    /* ── المؤشر الدائري ── */
    .progress-ring-wrap {
      position: relative; width: 42px; height: 42px; flex-shrink: 0;
    }
    .progress-ring-svg { transform: rotate(-90deg); }
    .progress-ring-bg {
      fill: none; stroke: var(--surface); stroke-width: 4;
    }
    .progress-ring-fill {
      fill: none; stroke: var(--blue); stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 107;
      stroke-dashoffset: 107;
      transition: stroke-dashoffset .35s ease, stroke .2s;
    }
    .file-card.done  .progress-ring-fill { stroke: var(--green); }
    .file-card.error .progress-ring-fill { stroke: var(--red); }

    .progress-ring-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: var(--blue-l);
      transition: color .2s;
    }
    .file-card.done  .progress-ring-icon { color: var(--green); }
    .file-card.error .progress-ring-icon { color: var(--red); }

    /* spin على الدائرة عند الاتصال / الحفظ */
    @keyframes ringSpinBg {
      to { stroke-dashoffset: 0; }
    }
    @keyframes ringRotate {
      to { transform: rotate(270deg); }
    }
    .progress-ring-fill.spinning {
      stroke-dashoffset: 27 !important;
      animation: ringRotate 1s linear infinite;
      transform-origin: 21px 21px;
      transform-box: fill-box;
    }

    /* ── نصوص الحالة ── */
    .progress-texts { flex: 1; min-width: 0; }
    .progress-status {
      font-size: 13px; font-weight: 600; color: var(--text);
      margin-bottom: 3px;
    }
    .progress-detail {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── شريط التقدم ── */
    .progress-track {
      width: 100%; height: 5px;
      background: var(--surface); border-radius: 100px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--blue2), var(--blue-l));
      border-radius: 100px;
      transition: width .3s ease;
    }
    .file-card.done  .progress-fill { background: var(--green); }
    .file-card.error .progress-fill { background: var(--red); }

    /* موجة متحركة عند التحميل بحجم غير معروف */
    @keyframes waveFlow {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    .progress-fill.wave {
      width: 100% !important;
      background: linear-gradient(90deg,
        var(--surface) 0%, var(--blue-d) 30%,
        var(--blue) 50%, var(--blue-d) 70%,
        var(--surface) 100%);
      background-size: 200% 100%;
      animation: waveFlow 1.6s ease-in-out infinite;
    }

    /* ── PDF Viewer ──────────────────────────────────── */
    .pdf-viewer-wrap {
      border-top: 1px solid var(--border);
      display: none;
    }
    .file-card.has-viewer .pdf-viewer-wrap { display: block; }

    .pdf-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .pdf-toolbar-title { font-size: 12px; color: var(--muted); font-weight: 600; }
    .pdf-pages-info    { font-size: 12px; color: var(--blue-l); font-weight: 700; white-space: nowrap; }

    .pdf-close-btn {
      background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; padding: 0 2px;
      line-height: 1; flex-shrink: 0;
    }

    .pdf-pages-container {
      padding: 12px;
      display: flex; flex-direction: column; gap: 12px;
      height: 80vh; overflow-y: scroll;
      background: #111827;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .pdf-page-wrap {
      position: relative; background: #fff;
      border-radius: 6px; overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,.6);
      animation: pageFadeIn .3s ease both;
      flex-shrink: 0;
    }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pdf-page-wrap canvas { display: block; width: 100%; height: auto; }

    .pdf-page-badge {
      position: absolute; bottom: 8px; left: 8px;
      background: rgba(0,0,0,.6); color: #fff;
      font-size: 10px; padding: 2px 8px; border-radius: 20px;
    }

    .pdf-msg {
      text-align: center; padding: 32px 16px;
      font-size: 13px; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .pdf-msg .pdf-msg-icon { font-size: 28px; }

    /* ── Error Box ───────────────────────────────────────────── */
    .error-box {
      display: none;
      margin: 0 16px 14px;
      background: #1a0505; border: 1px solid #7f1d1d;
      border-radius: 10px; padding: 12px 14px;
    }
    .file-card.error .error-box { display: block; }
    .error-box-title {
      font-size: 13px; font-weight: 700; color: var(--red);
      margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
    }
    .error-box-msg {
      font-size: 12px; color: #fca5a5;
      font-family: 'Courier New', monospace; direction: ltr;
      word-break: break-all; white-space: pre-wrap;
    }
    .error-box-steps {
      margin-top: 8px; font-size: 12px; color: #fca5a5;
      line-height: 1.7; list-style: none; padding: 0;
    }
    .error-box-steps li::before { content: "• "; color: var(--red); }
  </style>
</head>

<script>

/* ═══════════════════════════════════════════════════════════════════
   حالة الملفات في الذاكرة
   ═══════════════════════════════════════════════════════════════════ */
const fileState = {};   // 'idle' | 'downloading' | 'done' | 'error'

/* ═══════════════════════════════════════════════════════════════════
   Capacitor Filesystem helpers
   ── يعمل على native (iOS/Android) ويرجع null على الويب
   ═══════════════════════════════════════════════════════════════════ */
const FS         = () => CAP('Filesystem');
const FS_DIR     = 'DATA';
const FS_SUBDIR  = 'aqb_pdf/';

function toBase64(arrayBuffer) {
  let binary = '';
  const bytes = new Uint8Array(arrayBuffer);
  const chunk = 8192;
  for (let i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
  }
  return btoa(binary);
}

function fromBase64(b64) {
  const binary = atob(b64);
  const buf    = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) buf[i] = binary.charCodeAt(i);
  return buf.buffer;
}

async function fsFileExists(filename) {
  const fs = FS();
  if (!fs) return false;
  try {
    await fs.stat({ path: FS_SUBDIR + filename, directory: FS_DIR });
    return true;
  } catch { return false; }
}

async function fsSave(filename, arrayBuffer) {
  const fs = FS();
  if (!fs) return false;
  try {
    await fs.writeFile({
      path:      FS_SUBDIR + filename,
      data:      toBase64(arrayBuffer),
      directory: FS_DIR,
      recursive: true,
      encoding:  'base64',
    });
    return true;
  } catch (e) {
    return false;
  }
}

async function fsLoad(filename) {
  const fs = FS();
  if (!fs) return null;
  try {
    const result = await fs.readFile({
      path:      FS_SUBDIR + filename,
      directory: FS_DIR,
      encoding:  'base64',
    });
    return fromBase64(result.data);
  } catch { return null; }
}

/* ═══════════════════════════════════════════════════════════════════
   Cache API — احتياطي على الويب عندما لا يتوفر Capacitor
   ═══════════════════════════════════════════════════════════════════ */
const CACHE_NAME = 'aqb-files-v2';

async function cacheSave(fileId, buffer) {
  try {
    const cache = await caches.open(CACHE_NAME);
    const blob  = new Blob([buffer], { type: 'application/pdf' });
    await cache.put('pdf:' + fileId, new Response(blob));
  } catch { /* Cache API غير متاح */ }
}

async function cacheLoad(fileId) {
  try {
    const cache = await caches.open(CACHE_NAME);
    const resp  = await cache.match('pdf:' + fileId);
    return resp ? await resp.arrayBuffer() : null;
  } catch { return null; }
}

/* ═══════════════════════════════════════════════════════════════════
   حفظ + تحميل موحّد (native أولاً، ثم Cache API)
   ═══════════════════════════════════════════════════════════════════ */
async function storageSave(fileId, buffer) {
  const saved = await fsSave(fileId + '.pdf', buffer);
  if (!saved) await cacheSave(fileId, buffer);
}

async function storageLoad(fileId) {
  const fromFs = await fsLoad(fileId + '.pdf');
  if (fromFs) return fromFs;
  return cacheLoad(fileId);
}

/* ═══════════════════════════════════════════════════════════════════
   بناء HTML بطاقة الملف
   ═══════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════
   تحديث واجهة التقدم — رينج + شريط + نصوص
   circumference = 2π × 17 ≈ 107
   ═══════════════════════════════════════════════════════════════════ */
const RING_C = 107;

function setProgress(fileId, pct, statusText, mode = 'normal', detailText = '') {
  const ring    = document.getElementById('ring-'        + fileId);
  const icon    = document.getElementById('ring-icon-'   + fileId);
  const fill    = document.getElementById('fill-'        + fileId);
  const statEl  = document.getElementById('status-'      + fileId);
  const detEl   = document.getElementById('detail-'      + fileId);
  if (!fill) return;

  /* ── mode: 'normal' | 'spin' | 'wave' | 'done' | 'error' ── */
  const p = Math.min(100, Math.max(0, pct));

  if (mode === 'spin') {
    /* اتصال / حفظ — دوران كامل */
    ring.classList.add('spinning');
    fill.classList.remove('wave');
    fill.style.width = '0%';
    if (icon) icon.textContent = '↻';
  } else if (mode === 'wave') {
    /* تحميل بحجم غير معروف — موجة */
    ring.classList.add('spinning');
    fill.classList.add('wave');
    if (icon) icon.textContent = '⬇';
  } else {
    /* تقدم حقيقي أو نهاية */
    ring.classList.remove('spinning');
    fill.classList.remove('wave');
    ring.style.strokeDashoffset = RING_C * (1 - p / 100);
    fill.style.width = p + '%';
    if (icon) icon.textContent = p >= 100 ? '✓' : Math.round(p) + '%';
  }

  if (statusText && statEl) statEl.textContent = statusText;
  if (detEl) detEl.textContent = detailText;
}

function setCardState(fileId, state, statusText) {
  const card = document.getElementById('card-' + fileId);
  const btn  = document.getElementById('btn-'  + fileId);
  if (!card || !btn) return;

  card.classList.remove('downloading', 'done', 'error');
  btn.classList.remove('done', 'error-btn');
  card.classList.add(state);

  if (state === 'downloading') {
    btn.textContent = '⏸ جارٍ التحميل';
    btn.disabled    = true;
  } else if (state === 'done') {
    btn.textContent = '✓ مكتمل';
    btn.classList.add('done');
    btn.disabled = false;
    btn.onclick  = () => openExistingPDF(fileId);
  } else if (state === 'error') {
    btn.textContent = '↺ إعادة المحاولة';
    btn.classList.add('error-btn');
    btn.disabled = false;
    btn.onclick  = () => startDownload(fileId);
  }

  if (statusText) {
    const statEl = document.getElementById('status-' + fileId);
    if (statEl) statEl.textContent = statusText;
  }
}

/* ═══════════════════════════════════════════════════════════════════
   عرض الخطأ على الشاشة (بدلاً من console)
   ═══════════════════════════════════════════════════════════════════ */
function showError(fileId, message, steps = []) {
  const msgEl   = document.getElementById('err-msg-'   + fileId);
  const stepsEl = document.getElementById('err-steps-' + fileId);
  if (msgEl)   msgEl.textContent = message;
  if (stepsEl) stepsEl.innerHTML = steps.map(s => `<li>${s}</li>`).join('');
}

function clearError(fileId) {
  const msgEl   = document.getElementById('err-msg-'   + fileId);
  const stepsEl = document.getElementById('err-steps-' + fileId);
  if (msgEl)   msgEl.textContent = '';
  if (stepsEl) stepsEl.innerHTML = '';
}

/* ═══════════════════════════════════════════════════════════════════
   رسم صفحة واحدة في العارض
   ═══════════════════════════════════════════════════════════════════ */
async function renderPage(pdfDoc, pageNum, container, fileId, total) {
  const page     = await pdfDoc.getPage(pageNum);
  const scale    = window.devicePixelRatio > 1 ? 1.6 : 1.3;
  const viewport = page.getViewport({ scale });

  const wrap    = document.createElement('div');
  wrap.className = 'pdf-page-wrap';
  wrap.style.animationDelay = (pageNum * 0.04) + 's';

  const badge = document.createElement('div');
  badge.className   = 'pdf-page-badge';
  badge.textContent = `ص ${pageNum} / ${total}`;
  wrap.appendChild(badge);

  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = viewport.width;
  canvas.height = viewport.height;
  wrap.appendChild(canvas);
  container.appendChild(wrap);

  await page.render({ canvasContext: ctx, viewport }).promise;

  const info = document.getElementById('pages-info-' + fileId);
  if (info) info.textContent = `${pageNum} / ${total} صفحة`;
}

/* ═══════════════════════════════════════════════════════════════════
   عرض PDF تدريجياً صفحة بصفحة باستخدام PDF.js
   ═══════════════════════════════════════════════════════════════════ */
async function renderPDFProgressive(fileId, buffer) {
  const card      = document.getElementById('card-' + fileId);
  const container = document.getElementById('pages-' + fileId);
  if (!card || !container) return;

  card.classList.add('has-viewer');
  container.innerHTML = '';

  let pdfDoc;
  try {
    pdfDoc = await pdfjsLib.getDocument({ data: buffer }).promise;
  } catch (e) {
    container.innerHTML = `
      <div class="pdf-msg">
        <span class="pdf-msg-icon">❌</span>
        <span>تعذّر قراءة ملف PDF</span>
        <span style="font-size:11px;color:var(--red);">${e.message}</span>
      </div>`;
    return;
  }

  const total = pdfDoc.numPages;
  const info  = document.getElementById('pages-info-' + fileId);
  if (info) info.textContent = `0 / ${total} صفحة`;

  for (let i = 1; i <= total; i++) {
    await renderPage(pdfDoc, i, container, fileId, total);
    /* تأخير صغير بين الصفحات يتيح رؤية التحميل التدريجي */
    await new Promise(r => setTimeout(r, 40));
  }
}

/* ═══════════════════════════════════════════════════════════════════
   تحميل الملف — ثلاث طبقات حسب البيئة
   ═══════════════════════════════════════════════════════════════════

   الطبقة 1 — Native + CapacitorHttp مفعَّل في capacitor.config.json:
     fetch() يُوجَّه تلقائياً عبر HTTP النظام ← بدون CORS + شريط تقدم حقيقي

   الطبقة 2 — Native + CapacitorHttp plugin مباشر (احتياطي):
     CapacitorHttp.request() ← بدون CORS، شريط تقدم تقريبي

   الطبقة 3 — ويب عادي:
     fetch() مباشر ← يعتمد على CORS headers في الخادم

   ═══════════════════════════════════════════════════════════════════ */
function formatBytes(b) {
  if (b < 1024)    return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

/* ── الطبقة 1: fetch() مع ستريم — يعمل في native بفضل CapacitorHttp ── */
async function fetchStreamWithProgress(fileId, url) {
  setProgress(fileId, 0, 'جارٍ الاتصال…', 'spin');

  const response = await fetch(url, { redirect: 'follow' });
  if (!response.ok) throw new Error(`HTTP ${response.status}`);

  const contentLength = response.headers.get('Content-Length');
  const total = contentLength ? parseInt(contentLength, 10) : 0;

  const reader  = response.body.getReader();
  const chunks  = [];
  let received  = 0;
  let lastTime  = Date.now();
  let lastBytes = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;

    /* احسب السرعة كل 300ms */
    const now = Date.now();
    let speedText = '';
    if (now - lastTime >= 300) {
      const speed = (received - lastBytes) / ((now - lastTime) / 1000);
      speedText = formatBytes(speed) + '/ث';
      lastTime  = now;
      lastBytes = received;
    }

    if (total > 0) {
      const pct = (received / total) * 100;
      setProgress(fileId, pct, 'جارٍ التحميل', 'normal',
        `${formatBytes(received)} / ${formatBytes(total)}${speedText ? ' · ' + speedText : ''}`);
    } else {
      setProgress(fileId, 0, 'جارٍ التحميل', 'wave',
        `${formatBytes(received)} مُحمَّل${speedText ? ' · ' + speedText : ''}`);
    }
  }

  const merged = new Uint8Array(received);
  let pos = 0;
  for (const chunk of chunks) { merged.set(chunk, pos); pos += chunk.length; }
  return merged.buffer;
}

/* ── الطبقة 2: CapacitorHttp plugin مباشرةً — ضامن بدون CORS في native ─ */
async function capHttpDownload(fileId, url) {
  const http = CAP('CapacitorHttp');
  if (!http) throw new Error('CapacitorHttp غير متاح');

  /* CapacitorHttp لا يدعم streaming → موجة حتى يكتمل */
  setProgress(fileId, 0, 'جارٍ التحميل عبر النظام', 'wave',
    'يُستخدم HTTP الأصيل (بدون CORS)');

  const resp = await http.request({ method: 'GET', url, responseType: 'arraybuffer' });
  if (resp.status < 200 || resp.status >= 300)
    throw new Error(`HTTP ${resp.status}`);

  return fromBase64(resp.data);
}

/* ═══════════════════════════════════════════════════════════════════
   فتح ملف موجود محلياً (زر "مكتمل")
   ═══════════════════════════════════════════════════════════════════ */
async function openExistingPDF(fileId) {
  const card = document.getElementById('card-' + fileId);
  if (card.classList.contains('has-viewer')) {
    closeViewer(fileId);
    return;
  }

  const container = document.getElementById('pages-' + fileId);
  container.innerHTML = `
    <div class="pdf-msg">
      <span class="pdf-msg-icon">📂</span>
      <span>جارٍ تحميل الملف…</span>
    </div>`;
  card.classList.add('has-viewer');

  const buffer = await storageLoad(fileId);
  if (!buffer) {
    container.innerHTML = `
      <div class="pdf-msg">
        <span class="pdf-msg-icon">⚠️</span>
        <span>الملف غير موجود، حاول التحميل مجدداً</span>
      </div>`;
    return;
  }
  await renderPDFProgressive(fileId, buffer);
}

function closeViewer(fileId) {
  const card      = document.getElementById('card-' + fileId);
  const container = document.getElementById('pages-' + fileId);
  card.classList.remove('has-viewer');
  container.innerHTML = '';
}

/* ═══════════════════════════════════════════════════════════════════
   الدالة الرئيسية للتحميل
   ═══════════════════════════════════════════════════════════════════ */
async function startDownload(fileId) {
  if (fileState[fileId] === 'downloading') return;
  fileState[fileId] = 'downloading';

  const f = PDF_FILES.find(x => x.id === fileId);
  if (!f) return;

  setCardState(fileId, 'downloading');
  setProgress(fileId, 0, 'جارٍ التهيئة…', 'spin');

  /* ── 1. هل الملف محفوظ مسبقاً؟ ─────────────────────────── */
  const cached = await storageLoad(fileId);
  if (cached) {
    setProgress(fileId, 100, '✅ محفوظ محلياً', 'normal', 'يُفتح من التخزين المحلي');
    setCardState(fileId, 'done', '✅ محفوظ — اضغط لفتح');
    fileState[fileId] = 'done';
    await renderPDFProgressive(fileId, cached);
    showToast('📂 تم فتح الملف من التخزين المحلي');
    return;
  }

  let buffer;
  clearError(fileId);

  /* — محاولة الطبقة 1: fetch() streaming — */
  try {
    buffer = await fetchStreamWithProgress(fileId, f.downloadUrl);
  } catch (err1) {

    /* — محاولة الطبقة 2: CapacitorHttp مباشرةً (native فقط) — */
    if (isNative()) {
      try {
        buffer = await capHttpDownload(fileId, f.downloadUrl);
      } catch (err2) {
        setProgress(fileId, 0, '❌ فشل التحميل', 'normal', err1.message);
        setCardState(fileId, 'error', '❌ تعذّر التحميل');
        showError(fileId,
          'fetch: ' + err1.message + '\nCapacitorHttp: ' + err2.message,
          ['تحقق من اتصال الإنترنت', 'تأكد أن الرابط لا يزال صالحاً', 'أعد المحاولة']
        );
        fileState[fileId] = 'error';
        Haptics.error();
        return;
      }
    } else {
      setProgress(fileId, 0, '⚠️ فشل التحميل', 'normal', err1.message);
      setCardState(fileId, 'error', '⚠️ فشل التحميل');
      showError(fileId, err1.message, [
        'السبب المحتمل: الخادم يمنع الطلب (CORS)',
        'هذه الميزة تعمل بشكل كامل في تطبيق iOS/Android',
        'في المتصفح يجب أن يدعم الخادم CORS',
      ]);
      fileState[fileId] = 'error';
      return;
    }
  }

  /* ── 3. حفظ الملف محلياً عبر Capacitor Filesystem ──────── */
  setProgress(fileId, 100, 'جارٍ الحفظ…', 'spin', 'يُحفظ في ذاكرة الجهاز');
  await storageSave(fileId, buffer);

  setProgress(fileId, 100, '✅ اكتمل التحميل', 'normal', 'محفوظ — جارٍ فتح العارض…');
  setCardState(fileId, 'done', '✅ محفوظ — اضغط لفتح');
  fileState[fileId] = 'done';
  Haptics.success();
  showToast('✅ تم تحميل الملف وحفظه بنجاح');

  /* ── 4. عرض PDF تدريجياً صفحة بصفحة ───────────────────── */
  await renderPDFProgressive(fileId, buffer);
}

/* ═══════════════════════════════════════════════════════════════════
   التهيئة
   ═══════════════════════════════════════════════════════════════════ */
async function init() {
  document.getElementById('files-list').innerHTML =
    PDF_FILES.map(buildFileCard).join('');
  renderBottomNav('files');

  const online = await isOnline();
  const dot = document.getElementById('net-dot');
  if (dot) dot.classList.toggle('online', online);

  /* تحقق من الملفات المحفوظة مسبقاً وعدّل الأزرار */
  for (const f of PDF_FILES) {
    const exists = isNative()
      ? await fsFileExists(f.id + '.pdf')
      : await cacheLoad(f.id).then(r => !!r);

    if (exists) {
      fileState[f.id] = 'done';
      setProgress(f.id, 100, '✅ محفوظ محلياً');
      setCardState(f.id, 'done', '✅ محفوظ — اضغط لفتح');
    }
  }
}

init();
</script>
