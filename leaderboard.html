<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>المتصدرون — AQB EDU</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 12px; padding: 20px 16px 0;
    }
    .podium-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      flex: 1; max-width: 100px;
    }
    .podium-avatar { font-size: 32px; }
    .podium-name   { font-size: 12px; font-weight: 700; text-align: center; }
    .podium-score  { font-size: 11px; color: var(--muted); }
    .podium-block  {
      width: 100%; border-radius: 8px 8px 0 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900;
    }
    .p1 { background: linear-gradient(180deg, #f59e0b 0%, #92400e 100%); height: 90px; }
    .p2 { background: linear-gradient(180deg, #94a3b8 0%, #475569 100%); height: 70px; }
    .p3 { background: linear-gradient(180deg, #cd7c3e 0%, #7c3b1e 100%); height: 55px; }
    .my-rank-card {
      background: var(--blue-d); border: 1px solid var(--blue);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .period-tabs { display:flex; gap:8px; }
    .period-btn {
      flex:1; padding:8px; border-radius:8px; border:1px solid var(--border);
      background:var(--surface); color:var(--muted); font-size:12px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:all .2s;
    }
    .period-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }
  </style>
</head>
<body class="page">
<div class="topbar">
  <span class="topbar-icon">🏆</span>
  <h1>لوحة المتصدرين</h1>
  <button class="btn btn-ghost btn-sm" onclick="shareRank()">📤</button>
</div>

<div class="scroll">

  <!-- Period filter -->
  <div class="period-tabs">
    <button class="period-btn active" onclick="setPeriod('week', this)">هذا الأسبوع</button>
    <button class="period-btn" onclick="setPeriod('month', this)">هذا الشهر</button>
    <button class="period-btn" onclick="setPeriod('all', this)">الكل</button>
  </div>

  <!-- Podium -->
  <div class="podium" id="podium"></div>

  <!-- My rank -->
  <div class="my-rank-card" id="my-rank-card">
    <div class="lb-rank" id="my-rank-num" style="color:var(--blue-l);">#?</div>
    <div class="lb-avatar">👤</div>
    <div class="lb-name" id="my-name">أنت</div>
    <div class="lb-score" id="my-score">0 نقطة</div>
  </div>

  <!-- Full list -->
  <div class="section-label">الترتيب الكامل</div>
  <div id="lb-list"></div>

  <!-- Motivational -->
  <div class="card">
    <div class="card-body" style="text-align:center;gap:8px;">
      <div style="font-size:28px;">💪</div>
      <div style="font-size:13px;color:var(--muted);" id="motiv-text">واصل المذاكرة لتحسين ترتيبك!</div>
      <a href="quiz.html" class="btn btn-blue">📝 اختبار الآن</a>
    </div>
  </div>

</div>

<nav id="bottom-nav"></nav>
<script src="js/app.js"></script>
<script>
// Mock leaderboard data (in a real app this would come from a server)
const MOCK_PLAYERS = [
  { name:'ريم العتيبي',    avatar:'👩‍🎓', base:{ week:980, month:3800, all:12400 } },
  { name:'فهد الشمري',     avatar:'👨‍🎓', base:{ week:920, month:3600, all:11800 } },
  { name:'نورا السعيد',    avatar:'👩‍💻', base:{ week:870, month:3200, all:10500 } },
  { name:'عبدالله الزهراني',avatar:'🧑‍🎓', base:{ week:820, month:2900, all:9800 } },
  { name:'سارة القحطاني',  avatar:'👩‍🔬', base:{ week:760, month:2700, all:8900 } },
  { name:'محمد العمري',    avatar:'🧑‍💻', base:{ week:700, month:2400, all:7800 } },
  { name:'لمى الدوسري',    avatar:'👩‍🏫', base:{ week:650, month:2100, all:6900 } },
  { name:'خالد المطيري',   avatar:'🧑‍🔬', base:{ week:590, month:1900, all:5700 } },
  { name:'هند العسيري',    avatar:'👩‍📚', base:{ week:530, month:1700, all:4800 } },
];

let currentPeriod = 'week';

async function init() {
  renderBottomNav('');

  const myName   = await Prefs.get('name', 'أنت');
  const myPoints = await Prefs.get('points', 0);
  document.getElementById('my-name').textContent = myName;
  document.getElementById('my-score').textContent = myPoints + ' نقطة';

  render(myName, myPoints);
}

function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function getPlayers(myName, myPoints) {
  const list = MOCK_PLAYERS.map(p => ({ ...p, score: p.base[currentPeriod] }));
  list.push({ name: myName, avatar:'⭐', score: myPoints, isMe: true });
  return list.sort((a,b) => b.score - a.score);
}

function render(myName, myPoints) {
  const players = getPlayers(myName, myPoints);

  // Podium (top 3)
  const top3 = players.slice(0,3);
  const order = [1,0,2]; // silver, gold, bronze
  const ranks = ['🥇','🥈','🥉'];
  const classes = ['p2','p1','p3'];
  const heights = [1,2,0];
  document.getElementById('podium').innerHTML = order.map(i => {
    const p = top3[i];
    if (!p) return '<div class="podium-item"></div>';
    return `
    <div class="podium-item">
      <div class="podium-avatar">${p.avatar}</div>
      <div class="podium-name">${p.isMe ? '⭐ أنت' : p.name.split(' ')[0]}</div>
      <div class="podium-score">${p.score.toLocaleString('ar-SA')} نقطة</div>
      <div class="podium-block ${classes[i]}">${ranks[i]}</div>
    </div>`;
  }).join('');

  // My rank
  const myIdx = players.findIndex(p => p.isMe);
  document.getElementById('my-rank-num').textContent = '#' + (myIdx + 1);

  renderList();
}

function renderList() {
  Prefs.get('name', 'أنت').then(myName => {
    Prefs.get('points', 0).then(myPoints => {
      const players = getPlayers(myName, myPoints);
      const medals  = ['🥇','🥈','🥉'];
      document.getElementById('lb-list').innerHTML = players.map((p, i) => `
        <div class="lb-item${p.isMe ? ' me' : ''}" style="margin-bottom:8px;">
          <div class="lb-rank" style="color:${i<3?['#f59e0b','#94a3b8','#cd7c3e'][i]:'var(--muted)'}">
            ${i < 3 ? medals[i] : '#' + (i+1)}
          </div>
          <div class="lb-avatar">${p.avatar}</div>
          <div class="lb-name">${p.isMe ? '⭐ ' + p.name + ' (أنت)' : p.name}</div>
          <div class="lb-score">${p.score.toLocaleString('ar-SA')} نقطة</div>
        </div>`).join('');

      // Motivational
      const myIdx = players.findIndex(p => p.isMe);
      const msgs  = myIdx === 0 ? '🏆 أنت المتصدر الآن! حافظ على مكانتك.'
        : myIdx <= 2 ? `🔥 أنت في المركز ${myIdx+1} — بقليل من الجهد تصل للقمة!`
        : `💪 أنت في المركز ${myIdx+1} — واصل المذاكرة لتحسين ترتيبك!`;
      document.getElementById('motiv-text').textContent = msgs;
    });
  });
}

async function shareRank() {
  const myName   = await Prefs.get('name', 'أنت');
  const myPoints = await Prefs.get('points', 0);
  const players  = getPlayers(myName, myPoints);
  const myIdx    = players.findIndex(p => p.isMe);
  await Share.share(
    '🏆 ترتيبي في AQB EDU',
    `وصلت إلى المركز ${myIdx+1} بـ ${myPoints} نقطة في AQB EDU!\nانضم إليّ وتنافس معي.`,
    'https://ah-0.github.io/Test-web/'
  );
}

init();
</script>
</body>
</html>
