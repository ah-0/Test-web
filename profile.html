<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ملفي — AQB EDU</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .profile-header {
      background: linear-gradient(135deg, #1e3a5f 0%, #0d1b35 100%);
      border: 1px solid var(--blue); border-radius: var(--radius);
      padding: 24px 20px; display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .avatar-wrap { position: relative; }
    .avatar-edit {
      position: absolute; bottom: 0; left: 0;
      background: var(--blue); color: #fff; border-radius: 50%;
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; cursor: pointer; border: 2px solid var(--bg);
    }
    .profile-name  { font-size: 22px; font-weight: 800; color: var(--blue-l); }
    .profile-grade { font-size: 13px; color: var(--muted); }
    .profile-badges { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
    .achievement-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 14px; display: flex; align-items: center; gap: 12px;
    }
    .ach-icon { font-size: 28px; flex-shrink: 0; }
    .ach-title { font-size: 13px; font-weight: 700; }
    .ach-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .ach-locked { opacity: 0.4; }
  </style>
</head>
<body class="page">
<div class="topbar">
  <span class="topbar-icon">👤</span>
  <h1>ملفي الشخصي</h1>
  <button class="btn btn-ghost btn-sm" onclick="editProfile()">✏️ تعديل</button>
</div>

<div class="scroll">

  <!-- Profile header -->
  <div class="profile-header">
    <div class="avatar-wrap">
      <div class="avatar" id="profile-avatar" onclick="changeAvatar()">👤</div>
      <div class="avatar-edit" onclick="changeAvatar()">📷</div>
    </div>
    <div style="text-align:center;">
      <div class="profile-name" id="profile-name">...</div>
      <div class="profile-grade" id="profile-grade">طالب · AQB EDU</div>
    </div>
    <div class="profile-badges" id="profile-badges"></div>
  </div>

  <!-- Stats -->
  <div class="section-label">إحصائياتي</div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="s-points">0</div>
      <div class="stat-label">النقاط 🏆</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-streak">0</div>
      <div class="stat-label">يوم متتالي 🔥</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-quizzes">0</div>
      <div class="stat-label">اختبارات 📝</div>
    </div>
  </div>

  <!-- Progress per subject -->
  <div class="section-label">تقدمي في المواد</div>
  <div id="subject-progress"></div>

  <!-- Achievements -->
  <div class="section-label">الإنجازات</div>
  <div id="achievements-list"></div>

  <!-- Actions -->
  <div class="section-label">إجراءات</div>
  <div class="card">
    <div class="card-body" style="gap:8px;">
      <button class="btn btn-blue btn-full" onclick="shareProfile()">📤 مشاركة ملفي</button>
      <a href="settings.html" class="btn btn-ghost btn-full">⚙️ الإعدادات</a>
    </div>
  </div>

</div>

<nav id="bottom-nav"></nav>
<script src="js/app.js"></script>
<script>
const SUBJECTS_INFO = [
  { id:'math',    icon:'🔢', name:'الرياضيات' },
  { id:'arabic',  icon:'📖', name:'العربية' },
  { id:'science', icon:'🔬', name:'العلوم' },
  { id:'english', icon:'🌍', name:'الإنجليزية' },
  { id:'history', icon:'🏛️', name:'التاريخ' },
  { id:'general', icon:'🧠', name:'عام' },
];

const ACHIEVEMENTS = [
  { icon:'🎯', title:'أول اختبار',     sub:'أكمل أول اختبار لك',       key:'quiz_count',  threshold:1 },
  { icon:'🔥', title:'أسبوع متتالٍ',   sub:'7 أيام متتالية من الدراسة', key:'streak',       threshold:7 },
  { icon:'💯', title:'100 نقطة',       sub:'اجمع 100 نقطة',             key:'points',      threshold:100 },
  { icon:'📚', title:'عالم الرياضيات', sub:'أتقن مادة الرياضيات 70%+',  key:'prog_math',   threshold:0.7 },
  { icon:'⭐', title:'متصدر الأسبوع',  sub:'احتل المركز الأول',         key:'rank_first',  threshold:1 },
  { icon:'🃏', title:'حافظ البطاقات',  sub:'احفظ 20 بطاقة تعليمية',    key:'fc_total',    threshold:20 },
  { icon:'🏆', title:'500 نقطة',       sub:'اجمع 500 نقطة',             key:'points',      threshold:500 },
  { icon:'🎓', title:'10 اختبارات',    sub:'أكمل 10 اختبارات',          key:'quiz_count',  threshold:10 },
];

async function init() {
  renderBottomNav('profile');

  const name    = await Prefs.get('name', 'طالب');
  const grade   = await Prefs.get('grade', '');
  const avatar  = await Prefs.get('avatar', null);
  const points  = await Prefs.get('points', 0);
  const streak  = await Prefs.get('streak', 0);
  const quizzes = await Prefs.get('quiz_count', 0);

  document.getElementById('profile-name').textContent  = name;
  document.getElementById('profile-grade').textContent = (grade || 'طالب') + ' · AQB EDU';
  document.getElementById('s-points').textContent  = points;
  document.getElementById('s-streak').textContent  = streak;
  document.getElementById('s-quizzes').textContent = quizzes;

  if (avatar) {
    const av = document.getElementById('profile-avatar');
    av.innerHTML = `<img src="${avatar}" alt="صورة الملف" />`;
  }

  // Badges
  const badges = [];
  if (streak >= 3)   badges.push({ label:'🔥 ' + streak + ' أيام', cls:'badge-yellow' });
  if (points >= 100) badges.push({ label:'💯 ' + points + ' نقطة', cls:'badge-blue' });
  if (quizzes >= 5)  badges.push({ label:'📝 ' + quizzes + ' اختبار', cls:'badge-green' });
  document.getElementById('profile-badges').innerHTML = badges
    .map(b => `<span class="badge ${b.cls}">${b.label}</span>`).join('');

  // Subject progress
  const progList = SUBJECTS_INFO.map(s => {
    const raw = localStorage.getItem('aqb_progress_' + s.id);
    const val = raw ? parseFloat(raw) : 0;
    const pct = Math.round(val * 100);
    const color = pct >= 70 ? 'green' : pct >= 40 ? '' : pct > 0 ? 'yellow' : 'red';
    return `<div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:13px;">${s.icon} ${s.name}</span>
        <span style="font-size:12px;color:var(--muted);">${pct}%</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar ${color}" style="width:${Math.max(pct,2)}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('subject-progress').innerHTML = `<div class="card"><div class="card-body">${progList}</div></div>`;

  // Achievements
  const stats = { quiz_count: quizzes, streak, points };
  document.getElementById('achievements-list').innerHTML = ACHIEVEMENTS.map(a => {
    let val = stats[a.key] ?? 0;
    if (a.key.startsWith('prog_')) {
      const sid = a.key.replace('prog_','');
      val = parseFloat(localStorage.getItem('aqb_progress_' + sid) || '0');
    }
    const unlocked = val >= a.threshold;
    return `
    <div class="achievement-card${unlocked?'':' ach-locked'}" style="margin-bottom:8px;">
      <div class="ach-icon">${unlocked ? a.icon : '🔒'}</div>
      <div>
        <div class="ach-title">${a.title}</div>
        <div class="ach-sub">${a.sub}</div>
        ${unlocked ? '<span class="badge badge-green" style="margin-top:4px;">مفتوح ✅</span>'
                   : `<span class="badge badge-muted" style="margin-top:4px;">${Math.min(val, a.threshold)} / ${a.threshold}</span>`}
      </div>
    </div>`;
  }).join('');
}

async function changeAvatar() {
  const choice = await Dialog.confirm('تغيير الصورة', 'اختر مصدر الصورة — نعم للكاميرا، لا للمعرض');
  const src = await Camera.pick(choice ? 'CAMERA' : 'PHOTOS');
  if (!src) return;
  const av = document.getElementById('profile-avatar');
  av.innerHTML = `<img src="${src}" alt="صورة الملف" />`;
  await Prefs.set('avatar', src);
  await Haptics.success();
  showToast('✅ تم تحديث الصورة');
}

async function editProfile() {
  const name  = await Dialog.prompt('تعديل الاسم', '', await Prefs.get('name', 'طالب'));
  if (name === null) return;
  if (name.trim()) {
    await Prefs.set('name', name.trim());
    document.getElementById('profile-name').textContent = name.trim();
  }
  const grade = await Dialog.prompt('الصف / المستوى الدراسي', 'مثال: الصف الثالث الثانوي', await Prefs.get('grade', ''));
  if (grade !== null && grade.trim()) {
    await Prefs.set('grade', grade.trim());
    document.getElementById('profile-grade').textContent = grade.trim() + ' · AQB EDU';
  }
  await Haptics.success();
  showToast('✅ تم حفظ التعديلات');
}

async function shareProfile() {
  const name    = await Prefs.get('name', 'طالب');
  const points  = await Prefs.get('points', 0);
  const streak  = await Prefs.get('streak', 0);
  const quizzes = await Prefs.get('quiz_count', 0);
  await Share.share(
    'ملفي في AQB EDU',
    `اسمي ${name} — لديّ ${points} نقطة، ${streak} يوم متتالٍ و${quizzes} اختبارات مكتملة في AQB EDU!`,
    'https://ah-0.github.io/Test-web/'
  );
}

init();
</script>
</body>
</html>
